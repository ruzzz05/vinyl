<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Preguntas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* PALETA DE COLORES */
            --bg-body: #121212;       /* Casi negro */
            --bg-card: #1e1e1e;       /* Gris oscuro para tarjetas */
            --bg-input: #2d2d2d;      /* Gris para inputs */
            --accent-yellow: #FFD700; /* Amarillo fuerte */
            --text-main: #e5e5e5;     /* Blanco suave */
            --text-on-yellow: #000000;/* Negro para leer sobre amarillo */
            
            --mode-yonunca: 209, 213%, 56%;
            --mode-ask: 0, 79%, 72%;      
        }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* BARRA DE NAVEGACIÓN */
        nav {
            background-color: #000000;
            border-bottom: 1px solid #333;
        }
        
        .nav-link:hover {
            color: var(--accent-yellow);
        }

        /* SELECTOR DE MODO */
        .mode-selector {
            background-color: var(--bg-card);
            border-bottom: 1px solid #333;
        }
        
        .btn-mode {
            background-color: transparent;
            color: #888;
            font-weight: 600;
            border: 2px solid transparent;
        }
        
        .btn-mode.active {
            color: var(--accent-yellow);
            border-bottom: 2px solid var(--accent-yellow);
            background-color: rgba(255, 215, 0, 0.05);
        }
        
        /* TARJETA PRINCIPAL */
        .card {
            background-color: var(--bg-card);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }
        
        .card.yonunca { border-top: 4px solid var(--accent-yellow); }
        .card.ask { border-top: 4px solid var(--accent-yellow); }

        /* INPUT */
        textarea {
            background-color: var(--bg-input) !important;
            color: white !important;
            border: 1px solid #444 !important;
        }
        textarea:focus {
            border-color: var(--accent-yellow) !important;
            outline: none;
        }

        /* BOTÓN */
        .btn-next {
            background-color: var(--accent-yellow);
            color: var(--text-on-yellow);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #b39700;
            transition: all 0.1s;
        }
        
        .btn-next:hover { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #b39700;
            filter: brightness(1.1);
        }
        
        .btn-next:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }

        #names-input { display: none; }
        
        h2 { color: var(--accent-yellow); }
        .divider { background-color: #333; }

    </style>
</head>
<body>

    <nav class="p-4">
        <div class="container mx-auto flex justify-center space-x-6">
            <a href="index.html" class="nav-link px-4 py-2 rounded transition-colors">
                🎵 Música
            </a>
            <a href="#" class="nav-link px-4 py-2 rounded font-bold text-yellow-400">
                ❓ Juego de Preguntas
            </a>
        </div>
    </nav>

    <header class="mode-selector p-4 shadow-md">
        <div class="container mx-auto flex justify-center space-x-4">
            <button id="btn-yonunca" class="btn-mode yonunca active px-6 py-2 rounded-t-lg transition-colors">
                YO NUNCA
            </button>
            <button id="btn-ask" class="btn-mode ask px-6 py-2 rounded-t-lg transition-colors">
                ASK
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="card-container" class="card yonunca max-w-2xl w-full p-8 rounded-lg text-center transition-all">
            <h2 class="text-2xl font-bold mb-2 uppercase tracking-wider" id="mode-title">Yo Nunca</h2>
            <div class="divider h-px w-20 mx-auto my-4"></div>
            
            <textarea id="names-input" class="w-full p-3 rounded mb-4" placeholder="Introduce los nombres, uno por línea..."></textarea>
            
            <div class="min-h-[100px] flex items-center justify-center">
                <p id="question" class="text-2xl font-medium my-4 leading-relaxed">Cargando preguntas...</p>
            </div>
            
            <button id="btn-next" class="btn-next yonunca mt-6 px-10 py-4 rounded font-bold w-full sm:w-auto">
                Siguiente 🔄
            </button>
        </div>
    </main>

    <script>
        let currentMode = 'yonunca';
        let yonuncaQuestions = [];
        let askQuestions = [];
        let names = [];
        
        const btnYoNunca = document.getElementById('btn-yonunca');
        const btnAsk = document.getElementById('btn-ask');
        const btnNext = document.getElementById('btn-next');
        const cardContainer = document.getElementById('card-container');
        const questionElement = document.getElementById('question');
        const modeTitle = document.getElementById('mode-title');
        const namesInput = document.getElementById('names-input');
        
        // --- FUNCIÓN DE LECTURA DE CSV MODIFICADA ---
        async function fetchCSV(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const text = await response.text();
                
                return text.split('\n')
                    .map(line => line.trim()) // Quita espacios al principio y final
                    .filter(line => 
                        line.length > 0 &&      // Ignora líneas vacías
                        !line.startsWith('//')  // IGNORA COMENTARIOS QUE EMPIECEN POR //
                    ); 
            } catch (error) {
                console.error(`Error cargando ${url}:`, error);
                return ["⚠️ No se encontró el archivo " + url];
            }
        }

        async function loadQuestions() {
            questionElement.textContent = "Leyendo base de datos...";
            
            const [dataYoNunca, dataAsk] = await Promise.all([
                fetchCSV('yonunca.csv'),
                fetchCSV('ask.csv')
            ]);

            yonuncaQuestions = dataYoNunca;
            askQuestions = dataAsk;

            showRandomQuestion();
        }   
        
        function switchMode(newMode) {
            currentMode = newMode;

            btnYoNunca.classList.remove('active');
            btnAsk.classList.remove('active');
            cardContainer.className = 'card max-w-2xl w-full p-8 rounded-lg text-center transition-all fade-in';

            if (newMode === 'yonunca') {
                btnYoNunca.classList.add('active');
                cardContainer.classList.add('yonunca');
                modeTitle.textContent = 'YO NUNCA';
                namesInput.style.display = 'none';
            } else if (newMode === 'ask') {
                btnAsk.classList.add('active');
                cardContainer.classList.add('ask');
                modeTitle.textContent = 'ASK';
                namesInput.style.display = 'block';
                updateNames();
            }

            showRandomQuestion();
        }

        function updateNames() {
            const input = namesInput.value.trim();
            names = input ? input.split('\n').map(name => name.trim()).filter(name => name) : [];
        }
        
        function showRandomQuestion() {
            let questions = currentMode === 'yonunca' ? yonuncaQuestions : askQuestions;
            
            if (!questions || questions.length === 0 || questions[0].startsWith("⚠️")) {
                questionElement.textContent = questions[0] || 'No hay preguntas disponibles.';
                return;
            }

            questionElement.classList.remove('fade-in');

            setTimeout(() => {
                let randomIndex = Math.floor(Math.random() * questions.length);
                let selectedQuestion = questions[randomIndex];

                // 1. REEMPLAZO DE NOMBRES {name}
                if (currentMode === 'ask' && names.length > 0 && selectedQuestion.includes('{name}')) {
                    const nameCount = (selectedQuestion.match(/{name}/g) || []).length;
                    if (names.length < nameCount) {
                        questionElement.textContent = `⚠️ Faltan nombres. Necesito ${nameCount} personas.`;
                        questionElement.classList.add('fade-in');
                        return;
                    }
                    const shuffledNames = [...names].sort(() => Math.random() - 0.5);
                    let i = 0;
                    selectedQuestion = selectedQuestion.replace(/{name}/g, () => `<span style="color:var(--accent-yellow)">${shuffledNames[i++]}</span>`);
                }

                // 2. REEMPLAZO DE ASTERISCOS *texto* POR AMARILLO
                // Esta expresión busca texto entre asteriscos y le aplica el color
                selectedQuestion = selectedQuestion.replace(/\*(.*?)\*/g, '<span style="color:var(--accent-yellow)">$1</span>');

                questionElement.innerHTML = selectedQuestion;
                questionElement.classList.add('fade-in');

            }, 200);
        }

        btnYoNunca.addEventListener('click', () => switchMode('yonunca'));
        btnAsk.addEventListener('click', () => switchMode('ask'));
        btnNext.addEventListener('click', showRandomQuestion);
        namesInput.addEventListener('input', updateNames);
        
        document.addEventListener('DOMContentLoaded', () => {
            loadQuestions();
        });
    </script>
</body>
</html>
