<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* PALETA DE COLORES */
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2d2d2d;
            --accent-yellow: #FFD700;
            --text-main: #e5e5e5;
            --text-on-yellow: #000000;
            
            --mode-yonunca: 209, 213%, 56%;
            --mode-ask: 0, 79%, 72%;      
        }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========================= */
        /* BOTÓN MENÚ (ARRIBA IZQ)   */
        /* ========================= */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: var(--bg-card);
            color: var(--accent-yellow);
            border: 1px solid #333;
            padding: 8px 12px;
            font-size: 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .menu-btn:hover { background: #333; }

        /* ========================= */
        /* SELECTOR INTENSIDAD (ARRIBA DER) */
        /* ========================= */
        #intensity-wrapper {
            position: fixed; /* Flotante fijo */
            top: 20px;
            right: 20px;
            z-index: 40;
            
            display: flex; 
            align-items: center; 
            gap: 8px;
            background: var(--bg-card); 
            padding: 4px 12px; 
            border-radius: 20px; 
            border: 1px solid #333;
            transition: opacity 0.3s;
        }

        select#intensity-select {
            background: transparent; color: var(--accent-yellow); border: none; font-weight: bold; cursor: pointer;
        }
        select#intensity-select:focus { outline: none; }
        select#intensity-select option { background-color: #1a1a1a; color: white; }

        /* ========================= */
        /* SIDEBAR (MENÚ LATERAL)    */
        /* ========================= */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: var(--bg-card);
            color: white;
            padding: 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 60; /* Por encima de todo */
            box-shadow: 4px 0 15px rgba(0,0,0,0.7);
            border-right: 1px solid #333;
        }

        .sidebar.active { transform: translateX(0); }

        .close-sidebar {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: var(--accent-yellow);
            cursor: pointer;
            font-weight: bold;
        }

        .sidebar h2 {
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 24px;
            border-bottom: 2px solid var(--accent-yellow);
            padding-bottom: 10px;
            color: var(--accent-yellow);
        }

        .sidebar a {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 18px;
            transition: background 0.2s;
        }
        .sidebar a:hover { background: #333; color: var(--accent-yellow); }


        /* ========================= */
        /* ESTILOS JUEGO             */
        /* ========================= */
        .mode-selector { 
            background-color: transparent; /* Transparente ahora */
            margin-top: 60px; /* Espacio para los botones flotantes */
        }
        
        .btn-mode { background: transparent; color: #888; font-weight: 600; border: 2px solid transparent; }
        .btn-mode.active { color: var(--accent-yellow); border-bottom: 2px solid var(--accent-yellow); background: rgba(255, 215, 0, 0.05); }
        
        .card { background-color: var(--bg-card); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid #333; }
        .card.yonunca, .card.ask { border-top: 4px solid var(--accent-yellow); }

        h2.mode-title { color: var(--accent-yellow); }
        .divider { background-color: #333; }

        /* Botón Siguiente */
        .btn-next {
            background-color: var(--accent-yellow); color: var(--text-on-yellow);
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 0 #b39700; transition: all 0.1s;
        }
        .btn-next:hover { transform: translateY(2px); box-shadow: 0 2px 0 #b39700; filter: brightness(1.1); }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        /* Input nombres */
        .name-input-group input { background-color: var(--bg-input); color: white; border: 1px solid #444; }
        .name-input-group input:focus { border-color: var(--accent-yellow); outline: none; }
        .btn-add { background-color: #333; color: var(--accent-yellow); border: 1px solid #444; }
        .btn-add:hover { background-color: #444; }

        /* Etiquetas Jugadores */
        .player-tag {
            background-color: #333; color: white; border: 1px solid var(--accent-yellow);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .player-tag:hover { background-color: #444; cursor: pointer; }
        .player-tag span.x-mark { color: #ff4444; margin-left: 6px; font-weight: bold; }

        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="hamburger-btn" class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="sidebar" id="sidebar">
        <span class="close-sidebar" onclick="toggleMenu()">×</span>
        <h2>Menú</h2>
        <a href="index.html">🎵 Vinilos</a>
        <a href="ask.html"> Ask</a>
    </div>

    <div id="intensity-wrapper" class="hidden">
        <span class="text-xl">🍹</span>
        <div class="flex flex-col">
            <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Intensidad</span>
            <select id="intensity-select" class="text-lg">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
    </div>

    <header class="mode-selector p-4">
        <div class="container mx-auto flex justify-center space-x-4">
            <button id="btn-yonunca" class="btn-mode yonunca active px-6 py-2 rounded-t-lg transition-colors">
                YO NUNCA
            </button>
            <button id="btn-ask" class="btn-mode ask px-6 py-2 rounded-t-lg transition-colors">
                ASK
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="card-container" class="card yonunca max-w-2xl w-full p-8 rounded-lg text-center transition-all">
            <h2 class="text-2xl font-bold mb-2 uppercase tracking-wider mode-title" id="mode-title">Yo Nunca</h2>
            <div class="divider h-px w-20 mx-auto my-4"></div>
            
            <div id="names-section" class="hidden mb-6">
                <div class="name-input-group flex gap-2 mb-4">
                    <input type="text" id="new-name-input" class="flex-grow p-3 rounded" placeholder="Añadir jugador..." autocomplete="off">
                    <button id="btn-add-name" class="btn-add px-4 rounded text-xl font-bold transition-colors">+</button>
                </div>
                
                <div id="players-list" class="flex flex-wrap justify-center gap-2 min-h-[30px]"></div>
                <p class="text-xs text-gray-500 mt-2">Haz clic en un nombre para eliminarlo</p>
            </div>
            
            <div class="min-h-[100px] flex items-center justify-center">
                <p id="question" class="text-2xl font-medium my-4 leading-relaxed">Cargando preguntas...</p>
            </div>
            
            <button id="btn-next" class="btn-next yonunca mt-6 px-10 py-4 rounded font-bold w-full sm:w-auto">
                Siguiente 🔄
            </button>
        </div>
    </main>

    <script>
        // =========================
        // LÓGICA DEL MENÚ LATERAL
        // =========================
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        // =========================
        // LÓGICA DEL JUEGO
        // =========================
        let currentMode = 'yonunca';
        let yonuncaQuestions = [];
        let askQuestions = [];
        let players = []; 
        let intensity = 3; 

        const btnYoNunca = document.getElementById('btn-yonunca');
        const btnAsk = document.getElementById('btn-ask');
        const btnNext = document.getElementById('btn-next');
        const cardContainer = document.getElementById('card-container');
        const questionElement = document.getElementById('question');
        const modeTitle = document.getElementById('mode-title');
        const namesSection = document.getElementById('names-section');
        const newNameInput = document.getElementById('new-name-input');
        const btnAddName = document.getElementById('btn-add-name');
        const playersList = document.getElementById('players-list');
        const intensityWrapper = document.getElementById('intensity-wrapper');
        const intensitySelect = document.getElementById('intensity-select');

        intensitySelect.addEventListener('change', (e) => {
            intensity = parseInt(e.target.value);
            console.log("Intensidad cambiada a:", intensity);
        });

        function renderPlayers() {
            playersList.innerHTML = '';
            players.forEach((player, index) => {
                const tag = document.createElement('div');
                tag.className = 'player-tag px-3 py-1 rounded-full text-sm font-medium flex items-center';
                tag.innerHTML = `${player} <span class="x-mark">×</span>`;
                tag.onclick = () => removePlayer(index);
                playersList.appendChild(tag);
            });
        }

        function addPlayer() {
            const name = newNameInput.value.trim();
            if (name) {
                players.push(name);
                newNameInput.value = '';
                renderPlayers();
                newNameInput.focus();
            }
        }

        function removePlayer(index) {
            players.splice(index, 1);
            renderPlayers();
        }

        btnAddName.addEventListener('click', addPlayer);
        newNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPlayer();
        });

        async function fetchCSV(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const text = await response.text();
                return text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0 && !line.startsWith('//')); 
            } catch (error) {
                console.error(`Error cargando ${url}:`, error);
                return ["⚠️ No se encontró el archivo " + url];
            }
        }

        async function loadQuestions() {
            questionElement.textContent = "Leyendo base de datos...";
            const [dataYoNunca, dataAsk] = await Promise.all([
                fetchCSV('yonunca.csv'),
                fetchCSV('ask.csv')
            ]);
            yonuncaQuestions = dataYoNunca;
            askQuestions = dataAsk;
            showRandomQuestion();
        }   
        
        function switchMode(newMode) {
            currentMode = newMode;
            btnYoNunca.classList.remove('active');
            btnAsk.classList.remove('active');
            cardContainer.className = 'card max-w-2xl w-full p-8 rounded-lg text-center transition-all fade-in';

            if (newMode === 'yonunca') {
                btnYoNunca.classList.add('active');
                cardContainer.classList.add('yonunca');
                modeTitle.textContent = 'YO NUNCA';
                namesSection.classList.add('hidden');
                intensityWrapper.classList.add('hidden');
            } else if (newMode === 'ask') {
                btnAsk.classList.add('active');
                cardContainer.classList.add('ask');
                modeTitle.textContent = 'ASK';
                namesSection.classList.remove('hidden');
                intensityWrapper.classList.remove('hidden');
                renderPlayers();
            }

            showRandomQuestion();
        }

        function showRandomQuestion() {
            let questions = currentMode === 'yonunca' ? yonuncaQuestions : askQuestions;
            
            if (!questions || questions.length === 0 || questions[0].startsWith("⚠️")) {
                questionElement.textContent = questions[0] || 'No hay preguntas disponibles.';
                return;
            }

            questionElement.classList.remove('fade-in');

            setTimeout(() => {
                let randomIndex = Math.floor(Math.random() * questions.length);
                let selectedQuestion = questions[randomIndex];

                if (currentMode === 'ask' && players.length > 0 && selectedQuestion.includes('{name}')) {
                    const nameCount = (selectedQuestion.match(/{name}/g) || []).length;
                    if (players.length < nameCount) {
                        questionElement.textContent = `⚠️ Faltan nombres. Necesito ${nameCount} personas.`;
                        questionElement.classList.add('fade-in');
                        return;
                    }
                    const shuffledNames = [...players].sort(() => Math.random() - 0.5);
                    let i = 0;
                    selectedQuestion = selectedQuestion.replace(/{name}/g, () => `<span style="color:var(--accent-yellow)">${shuffledNames[i++]}</span>`);
                }

                selectedQuestion = selectedQuestion.replace(/{int(\s*[+\-]\s*\d+)?}/g, (match, operation) => {
                    let result = parseInt(intensity); 
                    if (operation) {
                        const opClean = operation.replace(/\s/g, ''); 
                        const operator = opClean[0];
                        const number = parseInt(opClean.substring(1));
                        if (operator === '+') result += number;
                        if (operator === '-') result -= number;
                    }
                    if (result < 1) result = 1;
                    return `<span style="color:var(--accent-yellow); font-size: 1.2em; font-weight:bold;">${result}</span>`;
                });

                selectedQuestion = selectedQuestion.replace(/\*(.*?)\*/g, '<span style="color:var(--accent-yellow)">$1</span>');

                questionElement.innerHTML = selectedQuestion;
                questionElement.classList.add('fade-in');

            }, 200);
        }

        btnYoNunca.addEventListener('click', () => switchMode('yonunca'));
        btnAsk.addEventListener('click', () => switchMode('ask'));
        btnNext.addEventListener('click', showRandomQuestion);
        
        document.addEventListener('DOMContentLoaded', loadQuestions);
    </script>
</body>
</html>
