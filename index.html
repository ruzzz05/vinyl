<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VINILOS</title>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
/* Estilo para ocultar el contenido inicialmente */
#main-content {
  display: none;
}

body {
  font-family: Arial, sans-serif;
  background-color: gray;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: white;
  margin-top: 50px; 
}

/* ========================= */
/* MENÚ LATERAL (SIDEBAR)    */
/* ========================= */

.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 3000;
  background: #222;
  color: white;
  border: none;
  padding: 10px 14px;
  font-size: 20px;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.3s ease, visibility 0.3s;
}

.menu-btn.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100%;
  background: #222;
  color: white;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 3500;
  box-shadow: 2px 0 5px rgba(0,0,0,0.5);
}

.sidebar.active {
  transform: translateX(0);
}

.close-sidebar {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  color: white;
  cursor: pointer;
  font-weight: bold;
  line-height: 1;
}

.close-sidebar:hover {
  color: #ccc;
}

.sidebar h2 {
  margin-top: 0;
  margin-bottom: 20px;
  font-size: 24px;
  border-bottom: 1px solid #444;
  padding-bottom: 10px;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 12px;
  border-radius: 5px;
  margin-bottom: 5px;
  font-size: 18px;
}

.sidebar a:hover {
  background: #444;
}

/* ========================= */
/* INPUTS Y FILTROS          */
/* ========================= */

#search, #tag-filter {
  margin: 10px auto 20px;
  padding: 10px;
  width: 100%;
  max-width: 300px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ccc;
  display: block;
}

#random-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 10px 20px;
  font-size: 16px;
  background: #222;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#random-btn:hover {
  background: #444;
}

/* ========================= */
/* GRID DE ARTISTAS          */
/* ========================= */
.artist {
  width: 300px;
  background: #9b9796;
  border-radius: 5px;
  padding: 15px;
  margin-bottom: 20px;
  box-sizing: border-box;
}

.artist-name {
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 18px;
}

.album {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.1);
  padding: 5px;
  border-radius: 5px;
}

.album img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 4px;
  cursor: pointer;
  display: block;
}

.album span {
  font-size: 14px;
  line-height: 1.2;
}

#artists-wrapper {
  display: flex;
  justify-content: center;
}

#artists {
  width: auto;
}

/* ========================= */
/* MODAL (POPUP)             */
/* ========================= */

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 4000;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #9b9796;
  padding: 30px;
  border-radius: 8px;
  text-align: center;
  max-width: 90%;
  width: 320px;
  position: relative;
}

.modal-content img {
  width: 100%;
  max-width: 250px;
  border-radius: 8px;
  margin-top: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.close-modal {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 28px;
  cursor: pointer;
  color: #333;
}

.close-modal:hover {
  color: black;
}
</style>
</head>

<body>

<div id="main-content">

    <button id="hamburger-btn" class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="sidebar" id="sidebar">
      <span class="close-sidebar" onclick="toggleMenu()">×</span>
      
      <h2>Menú</h2>
      <a href="index.html">🎵 Vinilos</a>
      <a href="ask.html">❓ Juego de Preguntas</a>
    </div>

    <h1>Artistas y Álbumes</h1>

    <input id="search" type="text" placeholder="Buscar artista o álbum..." />
    <select id="tag-filter">
      <option value="">Filtrar por estilo...</option>
    </select>

    <button id="random-btn"> Disco Random</button>

    <div id="artists-wrapper">
      <div id="artists">
        <p style="color:white; text-align:center;">Cargando biblioteca...</p>
      </div>
    </div>

    <div id="random-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">×</span>
        <h2 id="random-title"></h2>
        <p id="random-artist" style="font-weight:bold;"></p>
        <a id="random-link" target="_blank">
          <img id="random-image">
        </a>
      </div>
    </div>

</div> <script>
// --- 0. VALIDACIÓN DE CONTRASEÑA ---
(function checkPassword() {
  const password = prompt("Por favor, introduce la contraseña para acceder:");
  if (password === "0000") {
    // Si es correcta, mostramos el contenido
    document.getElementById('main-content').style.display = 'block';
  } else {
    // Si falla o cancela, redirigimos a ask.html
    alert("Contraseña incorrecta. Redirigiendo...");
    window.location.href = "ask.html";
  }
})();

let data = {}; 
const searchInput = document.getElementById('search');
const tagFilter = document.getElementById('tag-filter');
const artistsDiv = document.getElementById('artists');
let masonry;

// --- 1. CARGAR CSV ---
function loadCSV() {
  Papa.parse("musica.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      if (results.data && results.data.length > 0) {
        processCSVData(results.data);
      } else {
        artistsDiv.innerHTML = '<p style="color:white;">El archivo CSV está vacío o no se pudo leer.</p>';
      }
    },
    error: function(err) {
      console.error("Error leyendo CSV:", err);
      artistsDiv.innerHTML = '<p style="color:white;">Error cargando "musica.csv".<br>Recuerda abrir esto con un Servidor Local (Live Server) y no con doble clic.</p>';
    }
  });
}

// --- 2. PROCESAR DATOS ---
function processCSVData(csvData) {
  data = {};

  csvData.forEach(row => {
    const artist = row.Artist ? row.Artist.trim() : "Desconocido";
    const name = row.Name || "Sin título";
    const image = row.Image || "";
    const url = row.Url || "#";
    const tags = row.Tags ? row.Tags.split('|').map(t => t.trim().toLowerCase()) : [];

    if (!data[artist]) {
      data[artist] = [];
    }

    data[artist].push({ name, image, tags, url });
  });

  populateTagFilter();
  displayArtists(data);
}

// --- 3. MASONRY (Diseño) ---
function initMasonry() {
  if (masonry) masonry.destroy();
  masonry = new Masonry('#artists', {
    itemSelector: '.artist',
    columnWidth: 300,
    gutter: 20,
    fitWidth: true
  });
}

// --- 4. FILTROS Y TAGS ---
function getAllTags() {
  const tags = new Set();
  Object.values(data).forEach(albums =>
    albums.forEach(a => a.tags.forEach(t => tags.add(t)))
  );
  return [...tags].sort();
}

function populateTagFilter() {
  tagFilter.innerHTML = '<option value="">Filtrar por estilo...</option>';
  getAllTags().forEach(tag => {
    const option = document.createElement('option');
    option.value = tag;
    option.textContent = tag;
    tagFilter.appendChild(option);
  });
}

// --- 5. MOSTRAR EN PANTALLA ---
function displayArtists(artistsData) {
  artistsDiv.innerHTML = '';

  const artistNames = Object.keys(artistsData).sort();

  if (artistNames.length === 0) {
    artistsDiv.innerHTML = '<p style="color:white;">No hay coincidencias.</p>';
    return;
  }

  artistNames.forEach(artist => {
    const artistDiv = document.createElement('div');
    artistDiv.className = 'artist';
    
    let albumsHTML = '';
    artistsData[artist].forEach(album => {
      albumsHTML += `
        <div class="album">
          <a href="${album.url}" target="_blank">
            <img src="${album.image}" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
          </a>
          <span>${album.name}</span>
        </div>`;
    });

    artistDiv.innerHTML = `<div class="artist-name">${artist}</div>` + albumsHTML;
    artistsDiv.appendChild(artistDiv);
  });

  setTimeout(initMasonry, 150);
}

// --- 6. BUSCADOR ---
function searchAndFilterArtists() {
  const q = searchInput.value.toLowerCase();
  const tag = tagFilter.value;
  const result = {};

  for (const artist in data) {
    const albums = data[artist].filter(a => {
      const matchText = artist.toLowerCase().includes(q) || a.name.toLowerCase().includes(q);
      const matchTag = !tag || a.tags.includes(tag);
      return matchText && matchTag;
    });

    if (albums.length > 0) {
      result[artist] = albums;
    }
  }

  displayArtists(result);
}

searchInput.addEventListener('input', searchAndFilterArtists);
tagFilter.addEventListener('change', searchAndFilterArtists);

// --- 7. MODAL RANDOM ---
const modal = document.getElementById('random-modal');
const closeModalBtn = document.querySelector('.close-modal');

document.getElementById('random-btn').onclick = () => {
  const allAlbums = [];
  for (const artist in data) {
    data[artist].forEach(album => allAlbums.push({ ...album, artist }));
  }
  
  if (allAlbums.length === 0) return;

  const random = allAlbums[Math.floor(Math.random() * allAlbums.length)];
  
  document.getElementById('random-title').textContent = random.name;
  document.getElementById('random-artist').textContent = random.artist;
  document.getElementById('random-image').src = random.image;
  document.getElementById('random-link').href = random.url || "#";
  
  modal.style.display = 'flex';
};

closeModalBtn.onclick = () => modal.style.display = 'none';
window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };

// --- 8. FUNCION MENÚ ---
function toggleMenu() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('hamburger-btn');

  sidebar.classList.toggle('active');
  btn.classList.toggle('hidden');
}

// --- INICIALIZAR ---
loadCSV();

</script>
</body>
</html>
