<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VINILOS</title>

<style>
/* ... (TUS ESTILOS SE MANTIENEN EXACTAMENTE IGUAL) ... */
body {
  font-family: Arial, sans-serif;
  background-color: gray;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: white;
}

/* INPUTS */
#search, #tag-filter {
  margin: 10px auto 20px;
  padding: 10px;
  width: 100%;
  max-width: 300px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ccc;
  display: block;
}

#random-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 10px 20px;
  font-size: 16px;
  background: #222;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#random-btn:hover {
  background: #444;
}

/* VINILOS */
.artist {
  width: 300px;
  background: #9b9796;
  border-radius: 5px;
  padding: 15px;
  margin-bottom: 20px;
  box-sizing: border-box;
}

.artist-name {
  font-weight: bold;
  margin-bottom: 10px;
}

.album {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.album img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 5px;
  cursor: pointer;
}

/* WRAPPER MASONRY (NO TOCAR) */
#artists-wrapper {
  display: flex;
  justify-content: center;
}

#artists {
  width: auto;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #9b9796;
  padding: 20px;
  border-radius: 8px;
  text-align: center;
  max-width: 300px;
}

.modal-content img {
  width: 200px;
  border-radius: 8px;
  margin-top: 10px;
}

.close {
  float: right;
  font-size: 22px;
  cursor: pointer;
}

/* MENÚ LATERAL */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 3000;
  background: #222;
  color: white;
  border: none;
  padding: 10px 14px;
  font-size: 20px;
  border-radius: 6px;
  cursor: pointer;
}

.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100%;
  background: #222;
  color: white;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 2500;
}

.sidebar.active {
  transform: translateX(0);
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 10px;
}

.sidebar a:hover {
  background: #444;
}
</style>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
  <h2>Menú</h2>
  <a href="index.html">🎵 Música</a>
  <a href="ask.html">❓ Juego de Preguntas</a>
</div>

<h1>Artistas y Álbumes</h1>

<input id="search" type="text" placeholder="Buscar artista o álbum..." />
<select id="tag-filter">
  <option value="">Filtrar por estilo...</option>
</select>

<button id="random-btn">Disco Random</button>

<div id="artists-wrapper">
  <div id="artists">Cargando datos...</div>
</div>

<div id="random-modal" class="modal">
  <div class="modal-content">
    <span class="close">×</span>
    <h2 id="random-title"></h2>
    <p id="random-artist"></p>
    <a id="random-link" target="_blank">
      <img id="random-image">
    </a>
  </div>
</div>

<script>
/* MENÚ */
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('active');
}

// Variable global donde guardaremos los datos transformados
let data = {}; 

const searchInput = document.getElementById('search');
const tagFilter = document.getElementById('tag-filter');
const artistsDiv = document.getElementById('artists');
let masonry;

// --- FUNCIÓN PARA CARGAR EL CSV ---
function loadCSV() {
  Papa.parse("musica.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      processCSVData(results.data);
    },
    error: function(err) {
      console.error("Error leyendo CSV:", err);
      artistsDiv.innerHTML = "Error cargando el archivo musica.csv (Asegúrate de usar un servidor local).";
    }
  });
}

// --- TRANSFORMAR CSV PLANO A ESTRUCTURA DE ARTISTAS ---
function processCSVData(csvData) {
  // Reiniciamos data
  data = {};

  csvData.forEach(row => {
    // Aseguramos que existan las columnas mínimas
    const artist = row.Artist ? row.Artist.trim() : "Desconocido";
    const name = row.Name || "Sin título";
    const image = row.Image || "";
    const url = row.Url || "#";
    // Las tags en el CSV deben ir separadas por | (ej: rap|trap)
    const tags = row.Tags ? row.Tags.split('|').map(t => t.trim().toLowerCase()) : [];

    // Si el artista no existe en el objeto data, creamos su array
    if (!data[artist]) {
      data[artist] = [];
    }

    // Añadimos el álbum
    data[artist].push({
      name: name,
      image: image,
      tags: tags,
      url: url
    });
  });

  // Una vez procesado, inicializamos la web
  populateTagFilter();
  displayArtists(data);
}

// --- MASONRY ---
function initMasonry() {
  if (masonry) masonry.destroy();
  masonry = new Masonry('#artists', {
    itemSelector: '.artist',
    columnWidth: 300,
    gutter: 20,
    fitWidth: true
  });
}

// --- FILTROS Y TAGS ---
function getAllTags() {
  const tags = new Set();
  Object.values(data).forEach(albums =>
    albums.forEach(a => a.tags.forEach(t => tags.add(t)))
  );
  return [...tags].sort();
}

function populateTagFilter() {
  tagFilter.innerHTML = '<option value="">Filtrar por estilo...</option>';
  getAllTags().forEach(tag => {
    const option = document.createElement('option');
    option.value = tag;
    option.textContent = tag;
    tagFilter.appendChild(option);
  });
}

function displayArtists(artistsData) {
  artistsDiv.innerHTML = '';

  // Si no hay datos, mostrar mensaje
  if (Object.keys(artistsData).length === 0) {
    artistsDiv.innerHTML = '<p style="color:white;">No se encontraron resultados.</p>';
    return;
  }

  for (const artist in artistsData) {
    const artistDiv = document.createElement('div');
    artistDiv.className = 'artist';
    artistDiv.innerHTML = `<div class="artist-name">${artist}</div>`;

    artistsData[artist].forEach(album => {
      artistDiv.innerHTML += `
        <div class="album">
          <a href="${album.url}" target="_blank">
            <img src="${album.image}" onerror="this.src='https://via.placeholder.com/100?text=No+Img'">
          </a>
          <span>${album.name}</span>
        </div>`;
    });

    artistsDiv.appendChild(artistDiv);
  }

  // Esperar un poco para que cargue el DOM antes de Masonry
  setTimeout(initMasonry, 100);
}

// --- BUSQUEDA ---
function searchAndFilterArtists() {
  const q = searchInput.value.toLowerCase();
  const tag = tagFilter.value;
  const result = {};

  for (const artist in data) {
    // Filtramos los álbumes que cumplan la condición
    const albums = data[artist].filter(a => {
      const matchText = artist.toLowerCase().includes(q) || a.name.toLowerCase().includes(q);
      const matchTag = !tag || a.tags.includes(tag);
      return matchText && matchTag;
    });

    if (albums.length) result[artist] = albums;
  }

  displayArtists(result);
}

searchInput.addEventListener('input', searchAndFilterArtists);
tagFilter.addEventListener('change', searchAndFilterArtists);

/* RANDOM MODAL */
const modal = document.getElementById('random-modal');
const closeBtn = document.querySelector('.close');

document.getElementById('random-btn').onclick = () => {
  const allAlbums = [];
  // Aplanamos la data para elegir uno al azar
  for (const artist in data) {
    data[artist].forEach(album => allAlbums.push({ ...album, artist }));
  }
  
  if(allAlbums.length === 0) return;

  const random = allAlbums[Math.floor(Math.random() * allAlbums.length)];
  document.getElementById('random-title').textContent = random.name;
  document.getElementById('random-artist').textContent = random.artist;
  document.getElementById('random-image').src = random.image;
  document.getElementById('random-link').href = random.url || "#";
  modal.style.display = 'flex';
};

closeBtn.onclick = () => modal.style.display = 'none';
window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };

// --- INICIAR ---
// Llamamos a cargar el CSV al arrancar
loadCSV();

</script>

</body>
</html>
